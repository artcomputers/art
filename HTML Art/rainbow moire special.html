<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chromatic Wave Lines</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff; overflow: hidden; }
  canvas { display: block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>
<script>
/* ==========================================================================
   CHROMATIC WAVE LINES — recreation of the reference image as a live shader.

   How the reference is constructed (reverse-engineered):
   1. A field of thin horizontal stripes, small constant pitch (~8 px).
   2. The stripe phase is displaced by a large, smooth 2-D wave field
      (domain warping) -> the flowing bulges and pinches.
   3. THREE copies of that stripe field are printed like process inks —
      magenta, cyan, yellow — multiplied onto white paper. Each copy is
      offset a couple of px and warped slightly differently, so the plates
      "misregister": overlaps make violet (M*C), pink-orange (M*Y), green
      (C*Y); clean white where no ink lands. That misregistration is the
      whole chromatic-fringe look.

   Controls:  Space pause · S save frame · mouse X warp depth · mouse Y pitch
   ========================================================================== */

const VERT = `
precision highp float;
attribute vec3 aPosition;
void main() {
  vec4 pos = vec4(aPosition, 1.0);
  pos.xy = pos.xy * 2.0 - 1.0;
  gl_Position = pos;
}`;

const FRAG = `
precision highp float;

uniform float u_time;
uniform vec2  u_resolution;
uniform float u_warpDepth;   // mouse X: 0.4 .. 1.6 (1.0 matches reference)
uniform float u_pitch;       // mouse Y: 5 .. 14 px  (8 matches reference)

/* Smooth low-frequency displacement field. Three incommensurate sinusoid
   products give the blobby, column-like bulges of the reference; because the
   field varies with y as well as x, its vertical derivative locally
   compresses / dilates the stripe spacing exactly like the dense ripple
   pockets in the reference image. */
float warp(vec2 p, float t) {
  float w = 0.0;
  w += 55.0 * sin(p.x * 0.011 + t * 0.31)        * sin(p.y * 0.006 - t * 0.23);
  w += 30.0 * sin(p.x * 0.021 - t * 0.17 + 1.7)  * cos(p.y * 0.012 + t * 0.29);
  w += 12.0 * sin(p.x * 0.005 + p.y * 0.004 + t * 0.41);
  return w;
}

/* One ink plate: coverage of the warped stripe field at this pixel.
   'off'  = vertical plate misregistration (px)
   'gain' = per-plate warp multiplier — plates diverge most where the warp is
            strongest, which is where the reference shows the widest fringes. */
float plate(vec2 p, float off, float gain, float t) {
  float phase = (p.y + warp(p, t) * u_warpDepth * gain + off) / u_pitch;
  float d = abs(fract(phase) - 0.5);      // distance from stripe centre, 0..0.5
  // ~50% duty cycle, soft half-pixel edge: matches the airbrushed AA of the PNG
  return smoothstep(0.27, 0.27 - 0.06, d);
}

void main() {
  vec2 p = gl_FragCoord.xy;
  float t = u_time;

  /* Process-ink colours sampled from the reference:
     M*C -> the dominant violet, M*Y -> pink/salmon, C*Y -> the sparse green. */
  const vec3 MAGENTA = vec3(1.00, 0.45, 0.93);
  const vec3 CYAN    = vec3(0.42, 0.80, 1.00);
  const vec3 YELLOW  = vec3(0.95, 0.95, 0.33);

  /* Multiplicative (subtractive) compositing on white paper —
     each plate absorbs light where its stripes land. */
  vec3 col = vec3(1.0);
  col *= mix(vec3(1.0), MAGENTA, plate(p, -1.4, 1.000, t));
  col *= mix(vec3(1.0), CYAN,    plate(p,  0.0, 1.018, t));
  col *= mix(vec3(1.0), YELLOW,  plate(p,  1.9, 1.040, t));

  gl_FragColor = vec4(col, 1.0);
}`;

let sh;
let paused = false;
let warpDepth = 1.0;   // reference-matching defaults until mouse moves
let pitch = 8.0;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(1);
  noSmooth();
  sh = createShader(VERT, FRAG);
}

function draw() {
  shader(sh);
  sh.setUniform('u_time', (millis() / 1000) % 3600);
  sh.setUniform('u_resolution', [width, height]);
  sh.setUniform('u_warpDepth', warpDepth);
  sh.setUniform('u_pitch', pitch);
  rect(0, 0, width, height);
}

function mouseMoved() {
  warpDepth = constrain(map(mouseX, 0, width, 0.4, 1.6), 0.4, 1.6);
  pitch     = constrain(map(mouseY, 0, height, 5.0, 14.0), 5.0, 14.0);
}

function keyPressed() {
  if (key === ' ') { paused = !paused; paused ? noLoop() : loop(); return false; }
  if (key === 's' || key === 'S') saveCanvas('chromatic-waves', 'png');
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
